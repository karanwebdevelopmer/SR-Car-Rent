<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SR Subhash | Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
    import { getDatabase, ref, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDd5lR5hbpLvUzeBJstQ8sNWgv6RcHCH7U",
      authDomain: "car-website-1637b.firebaseapp.com",
      databaseURL: "https://car-website-1637b-default-rtdb.firebaseio.com",
      projectId: "car-website-1637b",
      storageBucket: "car-website-1637b.firebasestorage.app",
      messagingSenderId: "535352425150",
      appId: "1:535352425150:web:7f344485ccfc736cfffcef",
      measurementId: "G-R38Z527CGL"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const database = getDatabase(app);

    window.database = database;
    window.ref = ref;
    window.onValue = onValue;
    window.remove = remove;
    window.update = update;
  </script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: #03050b;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Background Effect */
    .cyber-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(ellipse at 20% 30%, #0a0f1a, #020408);
    }
    .cyber-bg::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        repeating-linear-gradient(0deg, rgba(230,126,34,0.03) 0px, rgba(230,126,34,0.03) 1px, transparent 1px, transparent 4px),
        repeating-linear-gradient(90deg, rgba(230,126,34,0.03) 0px, rgba(230,126,34,0.03) 1px, transparent 1px, transparent 4px);
      pointer-events: none;
    }

    /* Login Container */
    .login-container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      position: relative;
    }

    /* Animated Border Box */
    .login-box {
      background: rgba(8, 12, 22, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 2.5rem;
      max-width: 450px;
      width: 100%;
      text-align: center;
      position: relative;
      border: 1px solid rgba(230,126,34,0.3);
      animation: fadeInUp 0.6s ease-out;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Glowing border effect on hover */
    .login-box::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #e67e22, #f39c12, #e67e22);
      border-radius: 2rem;
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .login-box:hover::before {
      opacity: 0.3;
    }

    /* Logo Icon */
    .login-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(230,126,34,0.2), rgba(243,156,18,0.1));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      border: 2px solid rgba(230,126,34,0.5);
      animation: pulse 2s infinite;
    }
    .login-icon i {
      font-size: 2.5rem;
      color: #e67e22;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(230,126,34,0.4); }
      50% { box-shadow: 0 0 0 15px rgba(230,126,34,0); }
    }

    .login-box h2 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(95deg, #ffffff, #e67e22);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .login-subtitle {
      color: #9aa4bf;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }

    /* Input Group */
    .input-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 0.75rem;
      color: #ffbc6e;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }
    .password-wrapper {
      display: flex;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(230,126,34,0.4);
      border-radius: 1rem;
      transition: all 0.3s;
    }
    .password-wrapper:focus-within {
      border-color: #e67e22;
      box-shadow: 0 0 10px rgba(230,126,34,0.3);
    }
    .password-wrapper input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 1rem;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .eye-icon {
      background: none;
      border: none;
      color: #e67e22;
      cursor: pointer;
      padding: 0 1rem;
      font-size: 1.1rem;
      transition: all 0.3s;
    }
    .eye-icon:hover {
      color: #f39c12;
      transform: scale(1.1);
    }

    /* Login Button */
    .login-btn {
      width: 100%;
      background: linear-gradient(95deg, #e67e22, #f39c12);
      border: none;
      padding: 1rem;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1rem;
      color: #000;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 0.5rem;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(230,126,34,0.5);
    }
    .login-btn:active {
      transform: translateY(0);
    }

    /* Error Message */
    .error-msg {
      color: #ff4444;
      margin-top: 1rem;
      font-size: 0.85rem;
      background: rgba(255,68,68,0.1);
      padding: 0.8rem;
      border-radius: 1rem;
      border: 1px solid rgba(255,68,68,0.3);
    }

    /* Footer Links */
    .login-footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 0.7rem;
      color: #6b7280;
    }
    .login-footer i {
      color: #e67e22;
    }

    /* Admin Panel Styles */
    .admin-container {
      display: none;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(3, 5, 11, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(230,126,34,0.4);
      z-index: 1000;
    }
    .logo h2 {
      font-size: 1.2rem;
      color: #fff;
    }
    .logo h2 span {
      color: #e67e22;
    }
    .logout-btn {
      background: rgba(230,126,34,0.2);
      border: 1px solid #e67e22;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      color: #e67e22;
      cursor: pointer;
      transition: all 0.3s;
    }
    .logout-btn:hover {
      background: #e67e22;
      color: #000;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
      margin-top: 80px;
    }
    .stat-card {
      background: rgba(8, 12, 22, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 1.5rem;
      text-align: center;
      border: 1px solid rgba(230,126,34,0.3);
      transition: all 0.3s;
    }
    .stat-card:hover {
      transform: translateY(-5px);
      border-color: rgba(230,126,34,0.6);
    }
    .stat-card i {
      font-size: 2rem;
      color: #e67e22;
      margin-bottom: 0.5rem;
    }
    .stat-card h3 {
      font-size: 2rem;
    }
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(230,126,34,0.3);
      padding-bottom: 0.5rem;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 0.8rem 1.5rem;
      color: #9aa4bf;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s;
    }
    .tab-btn.active {
      color: #e67e22;
      border-bottom: 2px solid #e67e22;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .table-wrapper {
      overflow-x: auto;
      background: rgba(8, 12, 22, 0.5);
      border-radius: 1rem;
      padding: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    th {
      color: #e67e22;
      font-weight: 600;
    }
    .status-badge {
      padding: 0.3rem 0.8rem;
      border-radius: 2rem;
      font-size: 0.75rem;
    }
    .status-confirmed { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
    .status-pending { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
    .status-completed { background: rgba(33, 150, 243, 0.2); color: #2196F3; }
    .status-read { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
    .status-replied { background: rgba(33, 150, 243, 0.2); color: #2196F3; }
    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      margin: 0 0.3rem;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .delete-btn { color: #ff4444; }
    .delete-btn:hover { transform: scale(1.1); color: #ff6666; }
    .view-btn { color: #e67e22; }
    .view-btn:hover { transform: scale(1.1); color: #f39c12; }
    .search-box {
      margin-bottom: 1rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .search-box input {
      flex: 1;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(230,126,34,0.4);
      border-radius: 2rem;
      padding: 0.8rem 1rem;
      color: white;
      outline: none;
    }
    .search-box input:focus {
      border-color: #e67e22;
      box-shadow: 0 0 10px rgba(230,126,34,0.3);
    }
    .refresh-btn {
      background: rgba(230,126,34,0.2);
      border: 1px solid #e67e22;
      border-radius: 2rem;
      padding: 0.8rem 1.5rem;
      color: #e67e22;
      cursor: pointer;
      transition: all 0.3s;
    }
    .refresh-btn:hover {
      background: rgba(230,126,34,0.4);
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }
    .modal-content {
      background: rgba(8, 12, 22, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid rgba(230,126,34,0.5);
      padding: 2rem;
      animation: fadeInUp 0.3s ease;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(230,126,34,0.3);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    .modal-header h3 {
      color: #e67e22;
    }
    .close-modal {
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .close-modal:hover {
      color: #e67e22;
      transform: scale(1.1);
    }
    .detail-row {
      display: flex;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .detail-label {
      width: 140px;
      font-weight: 600;
      color: #e67e22;
    }
    .detail-value {
      flex: 1;
      color: #fff;
      word-break: break-word;
    }
    .status-select {
      background: rgba(0,0,0,0.5);
      border: 1px solid #e67e22;
      border-radius: 0.5rem;
      padding: 0.3rem 0.5rem;
      color: white;
    }
    .update-status-btn {
      background: #e67e22;
      border: none;
      border-radius: 0.5rem;
      padding: 0.3rem 0.8rem;
      color: #000;
      cursor: pointer;
      margin-left: 0.5rem;
      transition: all 0.2s;
    }
    .update-status-btn:hover {
      background: #f39c12;
    }

    @media (max-width: 768px) {
      th, td { padding: 0.5rem; font-size: 0.8rem; }
      .stats { grid-template-columns: 1fr 1fr; }
      .navbar { flex-direction: column; gap: 0.5rem; }
      .admin-container { padding: 1rem; margin-top: 80px; }
      .detail-label { width: 100px; font-size: 0.8rem; }
      .login-box { padding: 1.5rem; margin: 1rem; }
    }
  </style>
</head>
<body>
<div class="cyber-bg"></div>

<!-- Login Section -->
<div id="loginSection" class="login-container">
  <div class="login-box">
    <div class="login-icon">
      <i class="fas fa-shield-alt"></i>

    <button class="login-btn" id="loginBtn">

    <div id="loginError" class="error-msg" style="display: none;"></div>

</div>

<!-- Admin Panel Section -->
<div id="adminPanel" class="admin-container">
  <nav class="navbar">
    <div class="logo">
      <h2><i class="fas fa-crown"></i> SR SUBHASH <span>ADMIN PANEL</span></h2>
    </div>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </nav>

  <div class="stats">
    <div class="stat-card">
      <i class="fas fa-calendar-check"></i>
      <h3 id="totalBookings">0</h3>
      <p>Total Bookings</p>
    </div>
    <div class="stat-card">
      <i class="fas fa-envelope"></i>

      <p>Total Messages</p>

    <div class="stat-card">
      <i class="fas fa-rupee-sign"></i>

  <div class="tabs">
    <button class="tab-btn active" data-tab="bookings">
      <i class="fas fa-calendar"></i> Bookings
    </button>
    <button class="tab-btn" data-tab="contacts">
      <i class="fas fa-envelope"></i> Contact Messages
    </button>
  </div>

  <!-- Bookings Tab -->
  <div id="bookingsTab" class="tab-content active">
    <div class="search-box">
      <input type="text" id="bookingSearch" placeholder="🔍 Search by name, phone or booking ID...">
      <button class="refresh-btn" id="refreshBookings"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>Booking ID</th><th>Name</th><th>Phone</th><th>Date</th><th>Tour Plan</th><th>Vehicle</th><th>Amount</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="bookingsList"></tbody>
      </table>
    </div>
  </div>

  <!-- Contacts Tab -->
  <div id="contactsTab" class="tab-content">
    <div class="search-box">
      <input type="text" id="contactSearch" placeholder="🔍 Search by name, phone or message ID...">
      <button class="refresh-btn" id="refreshContacts"><i class="fas fa-sync-alt"></i> Refresh</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>Message ID</th><th>Name</th><th>Phone</th><th>Subject</th><th>Message</th><th>Date</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="contactsList"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle"><i class="fas fa-info-circle"></i> Details</h3>
      <button class="close-modal" onclick="closeModal()">&times;</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = "admin123";
  let allBookings = [];
  let allContacts = [];
  let currentViewItem = null;
  let currentViewType = null;

  function showToast(message, type) {
    const toast = document.createElement('div');
    toast.style.cssText = `
      position: fixed; bottom: 20px; right: 20px; z-index: 10000;
      background: ${type === 'success' ? 'rgba(76,175,80,0.95)' : 'rgba(244,67,54,0.95)'};
      color: white; padding: 1rem 1.5rem; border-radius: 1rem;
      animation: slideInRight 0.3s ease-out; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px); font-size: 0.9rem;
    `;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => {
      toast.style.animation = 'slideOutRight 0.3s ease-out';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  }

  function loadBookings() {
    if (!window.database) return;
    const bookingsRef = window.ref(window.database, 'bookings');
    window.onValue(bookingsRef, (snapshot) => {
      const data = snapshot.val();
      allBookings = [];
      if (data) {
        Object.keys(data).forEach(key => {
          allBookings.push({ firebaseId: key, ...data[key] });
        });
      }
      const localBookings = JSON.parse(localStorage.getItem('allBookings') || '[]');
      localBookings.forEach(lb => {
        if (!allBookings.find(b => b.bookingId === lb.bookingId)) {
          allBookings.push(lb);
        }
      });
      displayBookings();
      updateStats();
    });
  }

  function loadContacts() {
    if (!window.database) return;
    const contactsRef = window.ref(window.database, 'contacts');
    window.onValue(contactsRef, (snapshot) => {
      const data = snapshot.val();
      allContacts = [];
      if (data) {
        Object.keys(data).forEach(key => {
          allContacts.push({ firebaseId: key, ...data[key] });
        });
      }
      const localContacts = JSON.parse(localStorage.getItem('allContacts') || '[]');
      localContacts.forEach(lc => {
        if (!allContacts.find(c => c.messageId === lc.messageId)) {
          allContacts.push(lc);
        }
      });
      displayContacts();
      updateStats();
    });
  }

  function displayBookings() {
    const search = document.getElementById('bookingSearch')?.value.toLowerCase() || '';
    const filtered = allBookings.filter(b => 
      (b.name?.toLowerCase().includes(search) || 
       b.phone?.includes(search) || 
       b.bookingId?.toLowerCase().includes(search))
    );
    const tbody = document.getElementById('bookingsList');
    if (!tbody) return;
    tbody.innerHTML = filtered.map((b, idx) => `
      <tr>
        <td>${b.bookingId || '-'}</td>
        <td>${b.name || '-'}</td>
        <td>${b.phone || '-'}</td>
        <td>${b.pickupDate || '-'}</td>
        <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis;">${(b.tourPlan || '').substring(0, 30)}${(b.tourPlan || '').length > 30 ? '...' : ''}</td>
        <td>${b.vehicle || '-'}</td>
        <td>₹${b.totalAmount || (b.vehiclePrice + 1000) || 0}</td>
        <td><span class="status-badge status-${(b.status || 'pending').toLowerCase()}">${b.status || 'Pending'}</span></td>
        <td>
          <button class="action-btn view-btn" onclick="viewDetails('booking', ${idx})" title="View Details"><i class="fas fa-eye"></i></button>
          <button class="action-btn delete-btn" onclick="deleteBooking('${b.firebaseId || ''}', '${b.bookingId || ''}')" title="Delete"><i class="fas fa-trash"></i></button>
        </td>
      </tr>
    `).join('');
  }

  function displayContacts() {
    const search = document.getElementById('contactSearch')?.value.toLowerCase() || '';
    const filtered = allContacts.filter(c => 
      (c.name?.toLowerCase().includes(search) || 
       c.phone?.includes(search) || 
       c.messageId?.toLowerCase().includes(search))
    );
    const tbody = document.getElementById('contactsList');
    if (!tbody) return;
    tbody.innerHTML = filtered.map((c, idx) => `
      <tr>
        <td>${c.messageId || '-'}</td>
        <td>${c.name || '-'}</td>
        <td>${c.phone || '-'}</td>
        <td>${c.subject || '-'}</td>
        <td style="max-width:250px; overflow:hidden; text-overflow:ellipsis;">${(c.message || '').substring(0, 40)}${(c.message || '').length > 40 ? '...' : ''}</td>
        <td>${c.dateTime || new Date(c.timestamp).toLocaleString() || '-'}</td>
        <td><span class="status-badge status-${(c.status || 'pending').toLowerCase()}">${c.status || 'Pending'}</span></td>
        <td>
          <button class="action-btn view-btn" onclick="viewDetails('contact', ${idx})" title="View Details"><i class="fas fa-eye"></i></button>
          <button class="action-btn delete-btn" onclick="deleteContact('${c.firebaseId || ''}', '${c.messageId || ''}')" title="Delete"><i class="fas fa-trash"></i></button>
        </td>
      </tr>
    `).join('');
  }

  window.viewDetails = function(type, index) {
    currentViewType = type;
    const searchBookings = document.getElementById('bookingSearch')?.value.toLowerCase() || '';
    const searchContacts = document.getElementById('contactSearch')?.value.toLowerCase() || '';
    
    if (type === 'booking') {
      const filtered = allBookings.filter(b => 
        (b.name?.toLowerCase().includes(searchBookings) || 
         b.phone?.includes(searchBookings) || 
         b.bookingId?.toLowerCase().includes(searchBookings))
      );
      currentViewItem = filtered[index];
    } else {
      const filtered = allContacts.filter(c => 
        (c.name?.toLowerCase().includes(searchContacts) || 
         c.phone?.includes(searchContacts) || 
         c.messageId?.toLowerCase().includes(searchContacts))
      );
      currentViewItem = filtered[index];
    }
    
    if (!currentViewItem) return;
    
    const modal = document.getElementById('detailModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');
    
    if (type === 'booking') {
      modalTitle.innerHTML = '<i class="fas fa-calendar-check"></i> Booking Details';
      modalBody.innerHTML = `
        <div class="detail-row"><div class="detail-label">Booking ID:</div><div class="detail-value">${currentViewItem.bookingId || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Name:</div><div class="detail-value">${currentViewItem.name || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Phone:</div><div class="detail-value">${currentViewItem.phone || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Pickup Date:</div><div class="detail-value">${currentViewItem.pickupDate || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Pickup Time:</div><div class="detail-value">${currentViewItem.pickupTime || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Pickup Location:</div><div class="detail-value">${currentViewItem.pickupLocation || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Tour Plan:</div><div class="detail-value">${currentViewItem.tourPlan || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Vehicle:</div><div class="detail-value">${currentViewItem.vehicle || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Vehicle Price:</div><div class="detail-value">₹${currentViewItem.vehiclePrice || 0}</div></div>
        <div class="detail-row"><div class="detail-label">Driver Charges:</div><div class="detail-value">₹${currentViewItem.driverCharges || 1000}</div></div>
        <div class="detail-row"><div class="detail-label">Total Amount:</div><div class="detail-value">₹${currentViewItem.totalAmount || (currentViewItem.vehiclePrice + 1000) || 0}</div></div>
        <div class="detail-row"><div class="detail-label">Special Request:</div><div class="detail-value">${currentViewItem.specialRequest || 'None'}</div></div>
        <div class="detail-row"><div class="detail-label">Booking Date:</div><div class="detail-value">${new Date(currentViewItem.bookingTimestamp).toLocaleString() || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Status:</div><div class="detail-value">
          <select id="statusSelect" class="status-select">
            <option value="Pending" ${currentViewItem.status === 'Pending' ? 'selected' : ''}>Pending</option>
            <option value="Confirmed" ${currentViewItem.status === 'Confirmed' ? 'selected' : ''}>Confirmed</option>
            <option value="Completed" ${currentViewItem.status === 'Completed' ? 'selected' : ''}>Completed</option>
          </select>
          <button class="update-status-btn" onclick="updateBookingStatus()"><i class="fas fa-save"></i> Update</button>
        </div></div>
      `;
    } else {
      modalTitle.innerHTML = '<i class="fas fa-envelope"></i> Contact Message Details';
      modalBody.innerHTML = `
        <div class="detail-row"><div class="detail-label">Message ID:</div><div class="detail-value">${currentViewItem.messageId || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Name:</div><div class="detail-value">${currentViewItem.name || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Phone:</div><div class="detail-value">${currentViewItem.phone || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Subject:</div><div class="detail-value">${currentViewItem.subject || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Message:</div><div class="detail-value">${currentViewItem.message || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Date:</div><div class="detail-value">${currentViewItem.dateTime || new Date(currentViewItem.timestamp).toLocaleString() || '-'}</div></div>
        <div class="detail-row"><div class="detail-label">Status:</div><div class="detail-value">
          <select id="contactStatusSelect" class="status-select">
            <option value="Pending" ${currentViewItem.status === 'Pending' ? 'selected' : ''}>Pending</option>
            <option value="Read" ${currentViewItem.status === 'Read' ? 'selected' : ''}>Read</option>
            <option value="Replied" ${currentViewItem.status === 'Replied' ? 'selected' : ''}>Replied</option>
          </select>
          <button class="update-status-btn" onclick="updateContactStatus()"><i class="fas fa-save"></i> Update</button>
        </div></div>
      `;
    }
    modal.style.display = 'flex';
  };

  window.updateBookingStatus = async function() {
    const newStatus = document.getElementById('statusSelect').value;
    if (currentViewItem && currentViewType === 'booking') {
      try {
        if (currentViewItem.firebaseId && window.database) {
          const bookingRef = window.ref(window.database, `bookings/${currentViewItem.firebaseId}`);
          await window.update(bookingRef, { status: newStatus });
        }
        currentViewItem.status = newStatus;
        let localBookings = JSON.parse(localStorage.getItem('allBookings') || '[]');
        const index = localBookings.findIndex(b => b.bookingId === currentViewItem.bookingId);
        if (index !== -1) localBookings[index].status = newStatus;
        localStorage.setItem('allBookings', JSON.stringify(localBookings));
        displayBookings();
        closeModal();
        showToast('Status updated successfully!', 'success');
      } catch(e) {
        showToast('Error updating status', 'error');
      }
    }
  };

  window.updateContactStatus = async function() {
    const newStatus = document.getElementById('contactStatusSelect').value;
    if (currentViewItem && currentViewType === 'contact') {
      try {
        if (currentViewItem.firebaseId && window.database) {
          const contactRef = window.ref(window.database, `contacts/${currentViewItem.firebaseId}`);
          await window.update(contactRef, { status: newStatus });
        }
        currentViewItem.status = newStatus;
        let localContacts = JSON.parse(localStorage.getItem('allContacts') || '[]');
        const index = localContacts.findIndex(c => c.messageId === currentViewItem.messageId);
        if (index !== -1) localContacts[index].status = newStatus;
        localStorage.setItem('allContacts', JSON.stringify(localContacts));
        displayContacts();
        closeModal();
        showToast('Status updated successfully!', 'success');
      } catch(e) {
        showToast('Error updating status', 'error');
      }
    }
  };

  window.deleteBooking = async function(firebaseId, bookingId) {
    if (confirm('Are you sure you want to delete this booking?')) {
      try {
        if (firebaseId && window.database) {
          const bookingRef = window.ref(window.database, `bookings/${firebaseId}`);
          await window.remove(bookingRef);
        }
        let localBookings = JSON.parse(localStorage.getItem('allBookings') || '[]');
        localBookings = localBookings.filter(b => b.bookingId !== bookingId);
        localStorage.setItem('allBookings', JSON.stringify(localBookings));
        loadBookings();
        showToast('Booking deleted!', 'success');
      } catch(e) { showToast('Error deleting', 'error'); }
    }
  };

  window.deleteContact = async function(firebaseId, messageId) {
    if (confirm('Are you sure you want to delete this message?')) {
      try {
        if (firebaseId && window.database) {
          const contactRef = window.ref(window.database, `contacts/${firebaseId}`);
          await window.remove(contactRef);
        }
        let localContacts = JSON.parse(localStorage.getItem('allContacts') || '[]');
        localContacts = localContacts.filter(c => c.messageId !== messageId);
        localStorage.setItem('allContacts', JSON.stringify(localContacts));
        loadContacts();
        showToast('Message deleted!', 'success');
      } catch(e) { showToast('Error deleting', 'error'); }
    }
  };

  function updateStats() {
    document.getElementById('totalBookings').innerText = allBookings.length;
    document.getElementById('totalMessages').innerText = allContacts.length;
    const totalRevenue = allBookings.reduce((sum, b) => sum + (b.totalAmount || (b.vehiclePrice + 1000) || 0), 0);
    document.getElementById('totalRevenue').innerText = totalRevenue.toLocaleString();
  }

  window.closeModal = function() { 
    document.getElementById('detailModal').style.display = 'none'; 
  };

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById(`${tab}Tab`).classList.add('active');
    });
  });

  document.getElementById('bookingSearch')?.addEventListener('input', () => displayBookings());
  document.getElementById('contactSearch')?.addEventListener('input', () => displayContacts());
  document.getElementById('refreshBookings')?.addEventListener('click', () => loadBookings());
  document.getElementById('refreshContacts')?.addEventListener('click', () => loadContacts());

  // Login Logic
  const loginSection = document.getElementById('loginSection');
  const adminPanel = document.getElementById('adminPanel');
  const loginBtn = document.getElementById('loginBtn');
  const logoutBtn = document.getElementById('logoutBtn');
  const adminPassword = document.getElementById('adminPassword');
  const loginError = document.getElementById('loginError');
  const togglePassword = document.getElementById('togglePassword');

  togglePassword?.addEventListener('click', () => {
    const type = adminPassword.getAttribute('type') === 'password' ? 'text' : 'password';
    adminPassword.setAttribute('type', type);
    togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
  });

  function checkLogin() {
    const isLoggedIn = sessionStorage.getItem('adminLoggedIn') === 'true';
    if (isLoggedIn) {
      loginSection.style.display = 'none';
      adminPanel.style.display = 'block';
      loadBookings();
      loadContacts();
    } else {
      loginSection.style.display = 'flex';
      adminPanel.style.display = 'none';
    }
  }

  loginBtn?.addEventListener('click', () => {
    if (adminPassword.value === ADMIN_PASSWORD) {
      sessionStorage.setItem('adminLoggedIn', 'true');
      checkLogin();
      loginError.style.display = 'none';
      adminPassword.value = '';
    } else {
      loginError.style.display = 'block';
      loginError.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Wrong password! Access denied.';
    }
  });

  logoutBtn?.addEventListener('click', () => {
    sessionStorage.removeItem('adminLoggedIn');
    checkLogin();
  });

  adminPassword?.addEventListener('keypress', (e) => { 
    if (e.key === 'Enter') loginBtn.click(); 
  });

  checkLogin();

  // Add animation styles
  const style = document.createElement('style');
  style.textContent = `
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOutRight {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }
  `;
  document.head.appendChild(style);
</script>
</body>
</html>
